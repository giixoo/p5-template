<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p5 SVG Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container-fluid p-3">
    <div class="row g-3 align-items-start">

      <!-- Settings Panel -->
      <div class="col-md-3">
        <div class="card">
          <div class="card-header fw-semibold">Settings</div>
          <div class="card-body d-flex flex-column gap-3">
            <div>
              <label for="canvasWidth" class="form-label">Canvas Width</label>
              <input type="number" class="form-control" id="canvasWidth" value="800" min="1">
            </div>
            <div>
              <label for="canvasHeight" class="form-label">Canvas Height</label>
              <input type="number" class="form-control" id="canvasHeight" value="600" min="1">
            </div>
            <div>
              <label for="lineWidth" class="form-label">Line Width</label>
              <input type="number" class="form-control" id="lineWidth" value="0.3" step="0.1" min="0.1">
            </div>
            <button class="btn btn-primary" id="btnGenerate">Generate</button>
            <button class="btn btn-outline-secondary" id="btnSavePNG">Save PNG</button>
            <button class="btn btn-outline-secondary" id="btnSaveSVG">Save SVG</button>
          </div>
        </div>
      </div>

      <!-- Canvas Panel -->
      <div class="col-md-9">
        <div id="canvas-container" class="border rounded overflow-auto"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>
  <script src="sketch.js"></script>
  <script src="main.js"></script>
</body>
</html>
